name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck and build
        run: bun run build

      - name: Run frontend tests
        run: bun run test:frontend

  rust:
    name: Rust tests (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # Windows can't RUN the tests: our tests are lib unit tests, and a
      # Tauri lib test binary dies at load with STATUS_ENTRYPOINT_NOT_FOUND
      # without the Common-Controls manifest the app binary gets from
      # tauri-build — and cargo has no stable way to embed a manifest into
      # lib unit-test exes (rustc-link-arg-tests only covers a tests/ dir we
      # don't have; see rust-lang/cargo#10937). So Windows COMPILES+LINKS the
      # tests (catching Windows-specific build errors and #[cfg(windows)]
      # code) while the logic — all platform-independent — runs for real on
      # Linux and macOS.
      - name: Run Rust tests
        if: matrix.platform != 'windows-latest'
        run: cargo test --verbose
        working-directory: src-tauri

      - name: Compile Rust tests (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo test --verbose --no-run
        working-directory: src-tauri

      # cargo test rewrites src/bindings.ts from the live command list; a
      # diff here means someone changed commands without committing the
      # regenerated bindings the frontend builds against. One platform
      # suffices (the output is deterministic).
      - name: Bindings are committed and current
        if: matrix.platform == 'ubuntu-latest'
        run: git diff --exit-code src/bindings.ts
